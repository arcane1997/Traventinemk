<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travertine MK - Contact</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body { background: #f7f7f7; color: #222; }
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
    background: rgba(255,255,255,0.1);
}
header h1 { color:white; font-weight:400; letter-spacing:2px; }
nav a { margin-left:30px; text-decoration:none; color:white; font-weight:500; padding:8px 15px; border:2px solid transparent; border-radius:5px; transition:0.3s; }
nav a:hover { background: rgba(255,255,255,0.2); }

.contact-section {
    display:flex;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 120px auto 50px auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-text {
    flex:1;
    padding:50px;
}

.contact-text h2 {
    font-size:32px;
    margin-bottom:20px;
}

.contact-text p, .contact-text a {
    font-size:18px;
    margin-bottom:10px;
    color:#222;
    text-decoration:none;
}

.contact-text a:hover {
    text-decoration: underline;
}

.contact-image {
    flex:1;
    min-width:300px;
    max-height:500px;
    overflow:hidden;
}

.contact-image img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.footer {
    text-align:center;
    padding:40px;
    background:#111;
    color:white;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <h1>TRAVERTINE MK</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact-section">
    <div class="contact-text">
        <h2>Contact</h2>
        <p>Corso Italia, 255</p>
        <p>00011 – Villalba di Guidonia</p>
        <p>Roma (Italy)</p>
        <p>Email: <a href="mailto:pacifici@travertino.it">pacifici@travertino.it</a></p>
        <p>Tel. (+39) 0774 372141</p>
        <p>Fax (+39) 0774 372132</p>
    </div>
    <div class="contact-image">
        <img src="project/images/contact-image.jpg" alt="Travertine Contact">
    </div>
</section>

<div class="footer">© 2026 Travertine MK — All rights reserved</div>
</body>
</html>
